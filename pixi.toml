[workspace]
name = "SUSY_agent"
version = "0.1.0"
description = "pMSSM investigation for LHC Run 3 search targets"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
uproot = ">=5.3.7,<5.4"
awkward = ">=2.6,<3"
numpy = ">=2.0"
matplotlib = ">=3.10,<4"
scipy = ">=1.15,<2"
pyyaml = ">=6.0,<7"
# Required by genModels.py / Run3ModelGen
click = ">=8.1.7,<8.2"
pyslha = ">=3.3.0,<4"
structlog = ">=25.5.0,<26"
pandas = ">=2.2.2,<2.3"
rich = ">=13.7.1,<13.8"
colorama = ">=0.4.6,<0.5"
smodels = ">=3.1.1"
spheno-atlas = ">=4.0.6,<5"
tectonic = ">=0.15.0,<0.16"

[tasks]
# Analysis
analyze-phase1 = "python analysis/analyze_phase1.py"
analyze-phase2 = "python analysis/analyze_phase2.py"

# Scans (sources Run3ModelGen build first)
run-scans = { cmd = "bash -c 'source Run3ModelGen/build/setup.sh && python run_scans.py --phase all --max-workers 10'" }
run-phase1 = { cmd = "bash -c 'source Run3ModelGen/build/setup.sh && python run_scans.py --phase 1 --max-workers 10'" }
run-phase2 = { cmd = "bash -c 'source Run3ModelGen/build/setup.sh && python run_scans.py --phase 2 --max-workers 10'" }
