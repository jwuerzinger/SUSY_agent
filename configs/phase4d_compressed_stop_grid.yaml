# Phase 4d Grid: Compressed Stop + Wino LSP parameter space
#
# Motivation: MCMC produced only 26 models (mostly from seed 137).
# The viable corridor requires Wino LSP with stop mass close to
# the Wino mass (dm < 200 GeV) — too narrow for MCMC.
#
# Strategy: Cartesian grid over (M_2, mqL3, mtR, tanb).
# M_1 and mu set heavy to ensure Wino LSP.
# AT randomized for Higgs mass variation.
# M_3 moderate (affects stop mass through RGE).
#
# Grid: 6 × 5 × 5 × 3 = 450 points per seed

prior: grid
num_models: 450  # overridden by grid product
isGMSB: False

parameters:
  tanb: [5, 55]
  M_1: [1500, 1500]     # fixed heavy — Bino decoupled
  M_2: [-600, 600]      # grid axis — Wino LSP
  M_3: [2000, 3000]     # random moderate (stop mass)
  AT: [-6000, 6000]     # randomized (Higgs mass + stop mixing)
  Ab: [-2000, 2000]     # randomized
  Atau: [0, 0]          # fixed
  mu: [1500, 1500]      # fixed heavy — Higgsino decoupled
  mA: [1500, 1500]      # fixed heavy
  meL: [2000, 2000]     # fixed heavy
  mtauL: [2000, 2000]   # fixed heavy
  meR: [2000, 2000]     # fixed heavy
  mtauR: [2000, 2000]   # fixed heavy
  mqL1: [4000, 4000]    # fixed heavy
  mqL3: [200, 800]      # grid axis — stop/sbottom mass
  muR: [4000, 4000]     # fixed heavy
  mtR: [200, 800]       # grid axis — stop mass
  mdR: [4000, 4000]     # fixed heavy
  mbR: [1000, 3000]     # random (sbottom)

grid:
  M_2: [-600, -400, -200, 200, 400, 600]
  mqL3: [200, 350, 500, 650, 800]
  mtR: [200, 350, 500, 650, 800]
  tanb: [10, 25, 40]

# Note: softsusy omitted to maximise throughput for grid scans.
steps:
  - name: prep_input
    output_dir: input
    prefix: IN
  - name: SPheno
    input_dir: input
    output_dir: SPheno
    log_dir: SPheno_log
    prefix: SP
  - name: micromegas
    input_dir: SPheno
    output_dir: micromegas
    prefix: MO
  - name: superiso
    input_dir: SPheno
    output_dir: superiso
    prefix: SI
  - name: gm2calc
    input_dir: SPheno
    output_dir: gm2calc
    prefix: GM2
  - name: feynhiggs
    input_dir: SPheno
    output_dir: feynhiggs
    log_dir: feynhiggs_log
    prefix: FH
  - name: SModelS
    input_dir: SPheno
    output_dir: SModelS
    prefix: SModelS
