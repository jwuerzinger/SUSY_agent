prior: importance
num_models: 620  # overridden by importance logic (n_seeds * perturbations_per_seed)
isGMSB: False

importance:
  seed_file: results/seeds_phase5a.csv
  perturbations_per_seed: 10
  proposal_widths:
    M_1: 10.0       # narrow — must stay Bino LSP
    meL: 10.0       # narrow — co-annihilation strip
    meR: 10.0       # narrow — co-annihilation strip
    tanb: 2.0
    AT: 200.0       # moderate — affects Higgs mass
    M_3: 100.0
    mu: 50.0
    mA: 100.0
    Ab: 50.0
    Atau: 50.0

# Same ranges as phase4c for boundary enforcement
parameters:
  tanb: [5, 60]
  M_1: [-600, 600]
  M_2: [[-2000, -800], [800, 2000]]
  M_3: [2000, 4000]
  AT: [-6000, 6000]
  Ab: [-2000, 2000]
  Atau: [-2000, 2000]
  mu: [[-2000, -800], [800, 2000]]
  mA: [300, 2000]
  meL: [150, 700]
  mtauL: [2000, 2000]
  meR: [150, 700]
  mtauR: [2000, 2000]
  mqL1: [4000, 4000]
  mqL3: [1000, 3000]
  muR: [4000, 4000]
  mtR: [1000, 3000]
  mdR: [4000, 4000]
  mbR: [1000, 3000]

steps:
  - name: prep_input
    output_dir: input
    prefix: IN
  - name: SPheno
    input_dir: input
    output_dir: SPheno
    log_dir: SPheno_log
    prefix: SP
  - name: softsusy
    input_dir: input
    output_dir: softsusy
    prefix: SS
  - name: micromegas
    input_dir: SPheno
    output_dir: micromegas
    prefix: MO
  - name: superiso
    input_dir: SPheno
    output_dir: superiso
    prefix: SI
  - name: gm2calc
    input_dir: SPheno
    output_dir: gm2calc
    prefix: GM2
  - name: feynhiggs
    input_dir: SPheno
    output_dir: feynhiggs
    log_dir: feynhiggs_log
    prefix: FH
  - name: SModelS
    input_dir: SPheno
    output_dir: SModelS
    prefix: SModelS
